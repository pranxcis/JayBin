<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>JayBin Projects</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet">

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <link rel="stylesheet" href="../includes/style.css">

  <script src="../includes/include.js" defer></script>
</head>

<body>

  <!-- Header -->
  <div id="header"></div>

  <main>
        <!-- MAIN PROJECT SECTION -->
        <section
        class="projects-layout-section py-12"
        style="background-image: url('../resources/Project.jpg');">

        <!-- OVERLAY -->
        <div class="projects-layout-overlay"></div>

        <div class="container position-relative">

            <!-- HERO CONTENT -->
            <div class="projects-layout-header text-center">
            <p class="project-hero-subtext">
                A Preview of
            </p>
            <h1 class="project-hero-title">
                JayBin's Collection
            </h1>
            </div>

            <!-- MAIN LAYOUT -->
            <div class="row g-4 projects-layout">

            <!-- =====================================
                LEFT: PROJECTS
            ====================================== -->
            <div class="col-lg-4">
                <div class="projects-sidebar">
                <div class="sidebar-header mb-5 text-center">
                    <p class="section-label mb-2">
                    Portfolio Archive
                    </p>
                    <h2 class="section-title">
                    Work Collection
                    </h2>
                </div>

                <!-- PROJECT LIST -->
                <div class="project-list">
                    <!-- PROJECT -->
                    <button class="project-item" onclick="selectProject(0)">
                    <img
                        src="../resources/Solar System.png"
                        alt="Solar System project preview">
                    <h3>
                        Solar System
                    </h3>
                    </button>

                    <!-- PROJECT -->
                    <button class="project-item" onclick="selectProject(1)">
                    <img
                        src="../resources/Rotoscope.png"
                        alt="Rotoscope project preview">
                    <h3>
                        Rotoscope
                    </h3>
                    </button>

                    <!-- PROJECT -->
                    <button class="project-item" onclick="selectProject(2)">
                    <img
                        src="../resources/Placeholder.png"
                        alt="Operating System project preview">
                    <h3>
                        Operating System
                    </h3>
                    </button>

                </div>
                </div>
            </div>

            <!-- =====================================
                RIGHT: PROJECT PREVIEW
            ====================================== -->
            <div class="col-lg-8">
                <div class="project-details">
                <div class="details-header mb-5 text-center">
                    <p class="section-label mb-2">
                    Detailed View
                    </p>
                    <h2 class="section-title">
                    Project Preview
                    </h2>
                </div>

                <!-- DEFAULT STATE -->
                <div id="projectPlaceholder" class="project-placeholder">
                    <i class="bi bi-grid-1x2"></i>
                    <p>
                    Select a project to view details
                    </p>
                </div>

                <!-- ACTIVE CONTENT -->
                <div id="projectContent" style="display: none;">
                    <img
                    id="projectImage"
                    class="project-preview-img"
                    alt="Project preview">
                    <h2 id="projectTitle" class="project-title"></h2>
                    <p id="projectCategory" class="project-category"></p>
                    <p id="projectDescription" class="project-description"></p>

                    <div class="project-meta">
                    <div>
                        <span>Started</span>
                        <p id="projectStart"></p>
                    </div>
                    <div>
                        <span>Completed</span>
                        <p id="projectEnd"></p>
                    </div>
                    </div>

                    <a
                    id="projectLink"
                    href="#"
                    class="project-btn">
                    View Project
                    </a>
                </div>
                </div>
            </div>
            </div>
        </div>
        </section>
  </main>

  <!-- Footer -->
  <div id="footer"></div>
  
  <script src="../includes/projects.js"></script>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
  </script>

</body>
</html>
